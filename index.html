.stats {

.top2 { border:2px solid silver; }
.top3 { border:2px solid #cd7f32; }

<body>

<header>⚽ BAD BOYS FC</header>

<div class="logo">
<img src="https://cdn-icons-png.flaticon.com/512/53/53283.png">
</div>

<div class="admin">
<h3>Oyuncu Ekle</h3>
<input id="name" placeholder="İsim">
<input id="pos" placeholder="Pozisyon">
<button onclick="addPlayer()">Ekle</button>
</div>

<div class="container" id="players"></div>

<script>
let players = JSON.parse(localStorage.getItem("players")) || [];

function save(){
    localStorage.setItem("players", JSON.stringify(players));
}

function addPlayer(){
    const name = document.getElementById("name").value;
    const pos = document.getElementById("pos").value;

    if(!name || !pos) return alert("Boş bırakma");

    players.push({name,pos,gol:0,asist:0,mac:0,mvp:0});
    save();
    render();
}

function deletePlayer(i){
    players.splice(i,1);
    save();
    render();
}

function addStat(i,type){
    players[i][type]++;
    players[i].mvp = players[i].gol*2 + players[i].asist;
    save();
    render();
}

function render(){
    const container = document.getElementById("players");
    container.innerHTML = "";

    players.sort((a,b)=>b.mvp-a.mvp);

    players.forEach((p,i)=>{
        let rank="";
        if(i===0) rank="top1";
        if(i===1) rank="top2";
        if(i===2) rank="top3";

        container.innerHTML += `
        <div class="card ${rank}">
            <div class="name">${p.name}</div>
            <div>${p.pos}</div>

            <div class="stats">
            ⚽ ${p.gol} | 🎯 ${p.asist} | 🕹 ${p.mac}
            </div>

            ⭐ MVP: ${p.mvp}<br><br>

            <button onclick="addStat(${i},'gol')">Gol +</button>
            <button onclick="addStat(${i},'asist')">Asist +</button>
            <button onclick="addStat(${i},'mac')">Maç +</button><br>

            <button onclick="deletePlayer(${i})">Sil</button>
        </div>
        `;
    });
}

render();
</script>

</body>
</html>
